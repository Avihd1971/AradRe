name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Workers
        run: npm run build:cf
        env:
          DATABASE_URL: file:./dev.db
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'build-time-placeholder' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'https://aradre.workers.dev' }}

      - name: Provision D1 database and patch wrangler.jsonc
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ACCOUNT_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Account: $ACCOUNT_ID"

          DB_ID=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?name=aradre-db" \
            | python3 -c "
          import sys, json
          r = json.load(sys.stdin).get('result', [])
          print(r[0]['uuid'] if r else '')
          ")

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database aradre-db..."
            DB_ID=$(curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"aradre-db"}' \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['uuid'])")
            echo "Created: $DB_ID"
          else
            echo "Found existing: $DB_ID"
          fi

          sed -i "s/00000000-0000-0000-0000-000000000000/$DB_ID/g" wrangler.jsonc
          echo "Patched wrangler.jsonc with database_id=$DB_ID"

          npx wrangler d1 execute aradre-db --file=prisma/d1-schema.sql --remote || true

      - name: Set Worker runtime secrets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.NEXTAUTH_SECRET }}" | npx wrangler secret put NEXTAUTH_SECRET --config wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.jsonc
